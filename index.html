<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d0f12" />
    <title>Fruitbox — make ten</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-group">
          <a class="brand" href="/" aria-label="Fruitbox home">fruitbox</a>
          <button id="room-nav" class="mode-link" type="button">multiplayer</button>
        </div>
        <div class="status" aria-label="Game status">
          <span><b id="timer">02:00</b> left</span>
          <span><b id="score">0</b> score</span>
          <button id="new-game" type="button" aria-label="Start a new game">↻</button>
        </div>
      </header>

      <section id="room-screen" class="room-screen" hidden>
        <div id="room-entry" class="room-entry">
          <p class="room-kicker">Play with friends</p>
          <h1>Room</h1>
          <button id="create-room" class="room-primary" type="button">create room</button>
          <form id="join-room-form" class="join-room-form">
            <input id="room-code-input" aria-label="Room code" maxlength="6" placeholder="room code" autocomplete="off" />
            <button type="submit">join</button>
          </form>
          <p id="room-entry-error" class="room-error"></p>
          <div class="open-rooms-heading">
            <span>open rooms</span>
            <button id="refresh-rooms" type="button">refresh</button>
          </div>
          <ol id="open-rooms" class="open-rooms">
            <li class="open-rooms-empty">looking for rooms…</li>
          </ol>
        </div>
        <div id="room-lobby" class="room-lobby" hidden>
          <div class="room-heading">
            <div><span>room</span><strong id="room-code"></strong></div>
            <button id="copy-room" type="button">copy link</button>
          </div>
          <p id="room-state" class="room-state"></p>
          <ol id="room-roster" class="room-roster"></ol>
          <div class="room-controls">
            <button id="ready-room" type="button">ready</button>
            <button id="arm-room" class="room-primary" type="button">start when ready</button>
          </div>
          <p id="room-error" class="room-error"></p>
        </div>
      </section>

      <section id="play-area" class="play-area" aria-label="Fruitbox game">
        <div class="board-frame">
          <div id="board" class="board" role="grid" aria-label="Fruit grid">
            <div id="selection-box" class="selection-box" aria-hidden="true"></div>
          </div>
          <div class="game-over" id="game-over" hidden>
            <button id="close-results" class="close-results" type="button" aria-label="Close results and inspect board">×</button>
            <strong id="final-score">0</strong>
            <span>apples</span>
            <div class="result-actions">
              <button id="highlight-missed" type="button" hidden>highlight missed</button>
              <button id="play-again" type="button">again</button>
            </div>
          </div>
        </div>
        <div id="review-toolbar" class="review-toolbar" hidden>
          <span id="review-label"></span>
          <button id="show-missed" type="button">highlight missed</button>
          <button id="next-missed" type="button" hidden>next</button>
          <button id="hide-missed" type="button" hidden>hide</button>
          <button id="review-rematch" type="button" hidden>rematch</button>
        </div>
        <aside id="room-standings" class="room-standings" hidden>
          <div><span>room</span><b id="standings-code"></b></div>
          <ol id="standings-list"></ol>
        </aside>
      </section>

      <section id="global-leaderboard" class="leaderboard" aria-labelledby="leaderboard-title">
        <div class="leaderboard-heading">
          <h2 id="leaderboard-title">All-time</h2>
          <span>Score · time</span>
        </div>
        <ol id="leaderboard-list" aria-live="polite">
          <li class="leaderboard-empty">Loading scores…</li>
        </ol>
      </section>
    </main>

    <dialog id="username-dialog" aria-labelledby="username-title">
      <form id="username-form">
        <label for="username-input" id="username-title">Choose a name</label>
        <div class="username-fields">
          <input id="username-input" name="username" type="text" autocomplete="username" minlength="2" maxlength="20" placeholder="your name" required />
          <button type="submit">play</button>
        </div>
        <p id="username-error" role="alert"></p>
      </form>
    </dialog>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
